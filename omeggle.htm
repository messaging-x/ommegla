<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SupaChat | Live Video & Mic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: system-ui; height: 100vh; display: flex; flex-direction: column; }
        .video-container { display: grid; grid-template-columns: 1fr 1fr; flex: 1; gap: 2px; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; transform: scaleX(-1); }
        #remoteVideo { transform: scaleX(1); } /* Strangers shouldn't be mirrored */
        .chat-wrap { height: 200px; background: #111; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; color: #ccc; }
        .ui { padding: 10px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .next-btn { background: #ff4757; color: white; }
        .send-btn { background: #0084ff; color: white; }
        .status { font-size: 12px; padding: 5px; text-align: center; background: #0084ff; }
    </style>
</head>
<body>

    <div class="status" id="status">Connecting to media...</div>

    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="chat-wrap">
        <div id="msgs"></div>
        <div class="ui">
            <button class="next-btn" onclick="nextStranger()">NEXT</button>
            <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">Send</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bescumcfyltymxlkbhqw.supabase.co/rest/v1/';
        const SUPABASE_KEY = 'sb_publishable_dlN2AWz8yK4LAWilB9smVg_YJ4fhomK';

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const myId = 'user_' + Math.random().toString(36).substr(2, 9);
        let localStream, pc, channel, partnerId;

        // 1. Get Camera & Mic
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                startMatchmaking();
            } catch (e) {
                document.getElementById('status').innerText = "Error: Allow Camera/Mic access.";
            }
        }

        // 2. Matchmaking via Presence
        function startMatchmaking() {
            channel = supabase.channel('omegle_room', { config: { presence: { key: myId } } });

            channel
                .on('presence', { event: 'sync' }, () => {
                    if (partnerId) return; // Stop searching if already matched
                    const state = channel.presenceState();
                    for (const id in state) {
                        if (id !== myId && state[id][0].status === 'searching') {
                            connectTo(id);
                            break;
                        }
                    }
                })
                .on('broadcast', { event: 'signal' }, payload => {
                    if (payload.to === myId) handleWebRTCSignal(payload);
                })
                .on('broadcast', { event: 'text' }, payload => {
                    if (payload.to === myId) addMsg("Stranger: " + payload.msg);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('status').innerText = "Searching for strangers...";
                        await channel.track({ status: 'searching' });
                    }
                });
        }

        // 3. WebRTC Logic (The actual connection)
        async function connectTo(targetId) {
            partnerId = targetId;
            document.getElementById('status').innerText = "Connecting...";
            await channel.track({ status: 'busy' });

            setupPeerConnection(targetId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            channel.send({ type: 'broadcast', event: 'signal', to: targetId, from: myId, type_webrtc: 'offer', sdp: offer });
        }

        async function handleWebRTCSignal(data) {
            if (data.type_webrtc === 'offer') {
                partnerId = data.from;
                await channel.track({ status: 'busy' });
                setupPeerConnection(data.from);
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                channel.send({ type: 'broadcast', event: 'signal', to: data.from, from: myId, type_webrtc: 'answer', sdp: answer });
            } 
            else if (data.type_webrtc === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            } 
            else if (data.type_webrtc === 'candidate') {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }

        function setupPeerConnection(target) {
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            pc.onicecandidate = e => {
                if (e.candidate) channel.send({ type: 'broadcast', event: 'signal', to: target, from: myId, type_webrtc: 'candidate', candidate: e.candidate });
            };
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') document.getElementById('status').innerText = "Connected!";
            };
        }

        // 4. Chat & Skip
        function sendChat() {
            const input = document.getElementById('chatInput');
            if (!input.value || !partnerId) return;
            channel.send({ type: 'broadcast', event: 'text', to: partnerId, msg: input.value });
            addMsg("You: " + input.value);
            input.value = '';
        }

        async function nextStranger() {
            if (pc) pc.close();
            pc = null; partnerId = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('msgs').innerHTML = '';
            document.getElementById('status').innerText = "Searching...";
            await channel.track({ status: 'searching' });
        }

        function addMsg(t) {
            const d = document.createElement('div'); d.innerText = t;
            const b = document.getElementById('msgs'); b.appendChild(d);
            b.scrollTop = b.scrollHeight;
        }

        init();
    </script>
</body>
</html>
