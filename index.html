<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaOmegle | Video Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .video-container { display: grid; grid-template-columns: 1fr 1fr; flex: 1; gap: 5px; background: #1a1a1a; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; border: 1px solid #333; }
        #localVideo { transform: scaleX(-1); } /* Mirror local preview */
        #remoteVideo { background: #000 url('https://www.w3schools.com/howto/img_avatar.png') no-repeat center; background-size: contain; }
        .chat-area { height: 200px; background: #111; display: flex; flex-direction: column; border-top: 2px solid #333; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; color: #ddd; line-height: 1.5; }
        .controls { padding: 15px; display: flex; gap: 10px; background: #000; align-items: center; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
        button { padding: 10px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .next-btn { background: #ff4757; color: white; }
        .next-btn:hover { background: #ff6b81; }
        .send-btn { background: #0084ff; color: white; }
        .send-btn:hover { background: #1e90ff; }
        .status-bar { font-size: 12px; padding: 6px; text-align: center; background: #0084ff; font-weight: bold; }
        .system-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="status-bar" id="status">INITIALIZING CAMERA...</div>

    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="chat-area">
        <div id="msgs"></div>
        <div class="controls">
            <button class="next-btn" onclick="nextStranger()">NEXT</button>
            <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key=='Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION
        const SB_URL = 'https://bescumcfyltymxlkbhqw.supabase.co'; 
        const SB_KEY = 'sb_publishable_dlN2AWz8yK4LAWilB9smVg_YJ4fhomK'; // Replace with your rolled key

        // Initialize with a unique variable name to avoid "already declared" errors
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'user_' + Math.random().toString(36).substr(2, 9);
        let localStream, pc, channel, partnerId;

        // 2. INITIALIZE MEDIA
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                startMatchmaking();
            } catch (e) {
                updateStatus("ERROR: Camera access denied or not on a secure server (HTTPS/Localhost).");
                console.error(e);
            }
        }

        // 3. MATCHMAKING & SIGNALING
        function startMatchmaking() {
            // Join the global lobby channel
            channel = sbClient.channel('omegle_lobby', { 
                config: { presence: { key: myId } } 
            });

            channel
                .on('presence', { event: 'sync' }, () => {
                    if (partnerId) return; // Don't match if already in a call
                    const state = channel.presenceState();
                    
                    // Look for someone else who is "searching"
                    for (const id in state) {
                        if (id !== myId && state[id][0].status === 'searching') {
                            initiateCall(id);
                            break;
                        }
                    }
                })
                .on('broadcast', { event: 'signal' }, payload => {
                    if (payload.to === myId) handleWebRTCSignal(payload);
                })
                .on('broadcast', { event: 'text' }, payload => {
                    if (payload.to === myId) addMsg("Stranger", payload.msg);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        updateStatus("SEARCHING FOR STRANGERS...");
                        await channel.track({ status: 'searching' });
                    }
                });
        }

        // 4. WEBRTC HANDSHAKE
        async function initiateCall(targetId) {
            partnerId = targetId;
            updateStatus("CONNECTING TO STRANGER...");
            await channel.track({ status: 'busy' });

            setupPeerConnection(targetId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            channel.send({ 
                type: 'broadcast', 
                event: 'signal', 
                to: targetId, 
                from: myId, 
                type_webrtc: 'offer', 
                sdp: offer 
            });
        }

        async function handleWebRTCSignal(data) {
            if (data.type_webrtc === 'offer') {
                partnerId = data.from;
                await channel.track({ status: 'busy' });
                setupPeerConnection(data.from);
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                channel.send({ 
                    type: 'broadcast', 
                    event: 'signal', 
                    to: data.from, 
                    from: myId, 
                    type_webrtc: 'answer', 
                    sdp: answer 
                });
            } 
            else if (data.type_webrtc === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            } 
            else if (data.type_webrtc === 'candidate') {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }

        function setupPeerConnection(target) {
            pc = new RTCPeerConnection({ 
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] 
            });

            // Add local video/audio to the connection
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // When remote stream arrives
            pc.ontrack = e => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
            };

            // Send ICE candidates to the other person
            pc.onicecandidate = e => {
                if (e.candidate) {
                    channel.send({ 
                        type: 'broadcast', 
                        event: 'signal', 
                        to: target, 
                        from: myId, 
                        type_webrtc: 'candidate', 
                        candidate: e.candidate 
                    });
                }
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') updateStatus("CONNECTED!");
                if (pc.connectionState === 'disconnected') nextStranger();
            };
        }

        // 5. CHAT & UI FUNCTIONS
        function sendChat() {
            const input = document.getElementById('chatInput');
            if (!input.value || !partnerId) return;
            channel.send({ type: 'broadcast', event: 'text', to: partnerId, msg: input.value });
            addMsg("You", input.value);
            input.value = '';
        }

        window.nextStranger = async function() {
            if (pc) pc.close();
            pc = null; 
            partnerId = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('msgs').innerHTML = '';
            updateStatus("SEARCHING FOR NEXT STRANGER...");
            if(channel) await channel.track({ status: 'searching' });
        }

        function addMsg(sender, text) {
            const msgsDiv = document.getElementById('msgs');
            const div = document.createElement('div');
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            msgsDiv.appendChild(div);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        function updateStatus(txt) {
            document.getElementById('status').innerText = txt;
        }

        // Boot it up
        init();
    </script>
</body>
</html>
