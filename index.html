<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaChat | Scale & Resilient</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #video-grid { display: grid; grid-template-columns: 1fr 1fr; flex: 1; background: #111; gap: 5px; min-height: 0; }
        video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        #localVideo { transform: scaleX(-1); }
        #chat-section { height: 250px; background: #1a1a1a; display: flex; flex-direction: column; border-top: 2px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; border-bottom: 1px solid #333; }
        .controls { display: flex; padding: 10px; gap: 10px; background: #000; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .next-btn { background: #ff4757; color: white; }
        .send-btn { background: #0084ff; color: white; }
        .status-bar { padding: 8px; font-size: 12px; background: #0084ff; color: white; text-align: center; font-weight: bold; }
        .error-notif { color: #ff4757; font-size: 11px; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="status-bar" id="status">INITIALIZING...</div>

    <div id="video-grid">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-section">
        <div id="messages"></div>
        <div class="controls">
            <button class="next-btn" onclick="nextStranger()">NEXT</button>
            <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS
        const SB_URL = 'https://bescumcfyltymxlkbhqw.supabase.co';
        const SB_KEY = 'sb_publishable_dlN2AWz8yK4LAWilB9smVg_YJ4fhomK';
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'user_' + Math.random().toString(36).substr(2, 9);
        let localStream = null;
        let pc = null;
        let channel = null;
        let partnerId = null;

        // 1. Media Initialization (with fallback)
        async function initMedia() {
            try {
                // Try to get both video and audio
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                updateStatus("CAMERA/MIC ACTIVE");
            } catch (e) {
                console.warn("Media access denied:", e);
                updateStatus("CAMERA DENIED - CHAT ONLY MODE");
                appendMsg("System", "Camera/Mic access denied. You can still chat via text.");
                localStream = new MediaStream(); // Create empty stream so WebRTC doesn't break
            }
            joinLobby();
        }

        // 2. Presence-based Matchmaking
        function joinLobby() {
            channel = sbClient.channel('omegle_lobby', { config: { presence: { key: myId } } });

            channel
                .on('presence', { event: 'sync' }, () => {
                    if (partnerId) return;
                    const state = channel.presenceState();
                    for (const id in state) {
                        if (id !== myId && state[id][0].status === 'searching') {
                            initiateCall(id);
                            break;
                        }
                    }
                })
                .on('broadcast', { event: 'signal' }, payload => {
                    if (payload.to === myId) handleWebRTCSignal(payload);
                })
                .on('broadcast', { event: 'chat' }, payload => {
                    if (payload.to === myId) appendMsg("Stranger", payload.msg);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        updateStatus("SEARCHING FOR STRANGERS...");
                        await channel.track({ status: 'searching' });
                    }
                });
        }

        // 3. WebRTC Signaling
        async function initiateCall(targetId) {
            partnerId = targetId;
            updateStatus("CONNECTING...");
            await channel.track({ status: 'busy' });
            
            createPeerConnection(targetId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            sendSignal(targetId, { type_webrtc: 'offer', sdp: offer });
        }

        async function handleWebRTCSignal(data) {
            if (data.type_webrtc === 'offer') {
                partnerId = data.from;
                await channel.track({ status: 'busy' });
                createPeerConnection(data.from);
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                sendSignal(data.from, { type_webrtc: 'answer', sdp: answer });
            } 
            else if (data.type_webrtc === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            } 
            else if (data.type_webrtc === 'candidate') {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }

        function createPeerConnection(target) {
            // Google's STUN server helps bypass most firewalls
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            // Add tracks if we have them
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            pc.ontrack = e => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
            };

            pc.onicecandidate = e => {
                if (e.candidate) sendSignal(target, { type_webrtc: 'candidate', candidate: e.candidate });
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') updateStatus("CONNECTED!");
            };
        }

        // 4. Utility Functions
        function sendSignal(to, payload) {
            channel.send({ type: 'broadcast', event: 'signal', to, from: myId, ...payload });
        }

        function sendChat() {
            const input = document.getElementById('msgInput');
            if (!input.value || !partnerId) return;
            channel.send({ type: 'broadcast', event: 'chat', to: partnerId, msg: input.value });
            appendMsg("You", input.value);
            input.value = '';
        }

        window.nextStranger = async function() {
            if (pc) pc.close();
            pc = null;
            partnerId = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('messages').innerHTML = '';
            updateStatus("SEARCHING...");
            await channel.track({ status: 'searching' });
        }

        function updateStatus(txt) { document.getElementById('status').innerText = txt; }
        
        function appendMsg(sender, msg) {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.style.marginBottom = '5px';
            div.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            msgDiv.appendChild(div);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        // Start the process
        initMedia();
    </script>
</body>
</html>
